  html,

    background: #03030a;

  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .sky-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 360px at 48% 31%, rgba(89, 27, 186, 0.20), transparent 70%),
      radial-gradient(ellipse 660px 260px at 64% 37%, rgba(0, 218, 255, 0.08), transparent 74%),
      linear-gradient(180deg, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0) 60%);
    pointer-events: none;
  }

  .mark {
    position: absolute;
    opacity: 0.64;
    mix-blend-mode: screen;
    filter:
      drop-shadow(0 0 9px rgba(42, 224, 255, 0.46))

  }

    left: 305px;
    top: 150px;
    width: 640px;
    height: 310px;
  }

  .swords {
    left: 1095px;
    top: 178px;
    width: 350px;
    height: 328px;
  }

  .inline-logo {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .inline-logo path {
    fill: url(#prismFill) !important;
    stroke: url(#prismStroke) !important;
    stroke-width: 2.65px;
    stroke-linejoin: round;
    paint-order: stroke fill;
    opacity: 0.86;
  }

  .swords-svg path {
    stroke-width: 1.15px;
  }

  .ghost {
    position: absolute;
    inset: 0;
    opacity: 0.42;
    filter: blur(1.6px);
    mix-blend-mode: screen;
  }

  .ghost .inline-logo path {
    fill: #050612 !important;
    stroke: #2bfbff !important;
    opacity: 0.82;
  }

  .line-sheen {
    position: absolute;
    inset: -4px;
    background:
      repeating-linear-gradient(0deg, transparent 0 24px, rgba(84, 238, 255, 0.28) 25px, transparent 27px),
      repeating-linear-gradient(90deg, transparent 0 32px, rgba(255, 56, 191, 0.23) 33px, transparent 35px),
      repeating-linear-gradient(132deg, transparent 0 42px, rgba(255, 216, 54, 0.22) 43px, transparent 45px);
    mix-blend-mode: screen;
    opacity: 0.42;
    clip-path: inset(0 round 2px);
    pointer-events: none;
  }

  .horizon-glow {
    position: absolute;
    left: 0;
    right: 0;
    top: 618px;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(72, 230, 255, 0.38), rgba(255, 238, 65, 0.35), rgba(255, 39, 160, 0.40), transparent);
    filter: blur(2px);
    opacity: 0.7;
  }
